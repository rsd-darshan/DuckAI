# Scan commits for secrets (API keys, .env leaks). Enable in repo Settings if needed.
name: Gitleaks

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
