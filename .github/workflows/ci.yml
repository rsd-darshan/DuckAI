# SideAI — backend smoke tests, frontend build + unit tests, Electron deps check
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: sideai/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sideai/backend/requirements.txt

      - name: Install system packages (headless display + OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (main entrypoints)
        run: |
          python -m py_compile main.py database.py config.py ai_engine.py

      - name: Smoke tests
        run: xvfb-run -a python -m unittest tests/test_smoke.py -v

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sideai/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sideai/frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm test

  electron:
    name: Electron (lockfile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sideai/electron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sideai/electron/package-lock.json

      - run: npm ci
